services:
  - type: web
    name: bid-nobid
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: GDRIVE_CREDENTIALS
        sync: false
      - key: GDRIVE_FOLDER_ID
        sync: false
