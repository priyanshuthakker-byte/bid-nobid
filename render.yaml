services:
  - type: web
    name: bid-nobid
    env: python
    plan: free
    buildCommand: |
      apt-get update -qq && apt-get install -y -qq tesseract-ocr poppler-utils libgomp1
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GDRIVE_CREDENTIALS
        sync: false
      - key: GDRIVE_FOLDER_ID
        sync: false
