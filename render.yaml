services:
  - type: web
    name: bid-nobid
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python preflight_check.py && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GDRIVE_CREDENTIALS
        sync: false
      - key: GDRIVE_FOLDER_ID
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
