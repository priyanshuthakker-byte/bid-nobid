<script>
// ═══════════════════════════════════════════════════════════════════════════
// STABILIZED CORE SCRIPT — Fixes Navigation & State Conflicts
// ═══════════════════════════════════════════════════════════════════════════

// ── GLOBAL STATE ────────────────────────────────────────────────────────────
var _db = {};              // Local cache of tenders
var _lastDb = {};          // Alias for compatibility
var profileData = {};      // Company profile
var currentTenderId = '';  // Currently selected tender
var activePage = 'dashboard';

// ── UTILITIES ──────────────────────────────────────────────────────────────
function _sv(v) {
  if (v === null || v === undefined || v === '') return '—';
  if (typeof v === 'object') return v.value || v.text || JSON.stringify(v);
  return String(v);
}

function toast(msg, type='info', dur=3000) {
  var wrap = document.getElementById('tw');
  if(!wrap) return;
  var div = document.createElement('div');
  div.className = 'toast ' + (type==='error'?'err':type==='success'?'ok':'info');
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(function(){ if(div.parentNode) div.parentNode.removeChild(div); }, dur);
}

function showLoading(msg) {
  var lov = document.getElementById('lov');
  if(lov) { lov.classList.add('open'); document.getElementById('ltxt').textContent = msg||'Processing...'; }
}
function hideLoading() {
  var lov = document.getElementById('lov');
  if(lov) lov.classList.remove('open');
}

// ── NAVIGATION (Unified) ──────────────────────────────────────────────────
function go(pageName) {
  // Hide all pages
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nav-i').forEach(function(n){ n.classList.remove('on'); });
  
  // Show target page
  var target = document.getElementById('page-' + pageName);
  if(target) {
    target.classList.add('on');
    activePage = pageName;
    
    // Update Sidebar Active State
    var navItem = document.querySelector('.nav-i[onclick*="\' '+pageName+'\'"]');
    if(navItem) navItem.classList.add('on');
    
    // Update Topbar Title
    var titles = {
      dashboard:'Dashboard', tenders:'All Tenders', analyse:'Analyse Tender',
      boq:'BOQ / Costing', checklist:'Checklist', documents:'Documents',
      vault:'Doc Vault', reports:'Reports', analytics:'Analytics',
      postaward:'Post-Award', emd:'EMD Tracker', profile:'Company Profile',
      settings:'Settings', diagnose:'Self-Diagnose'
    };
    var titleEl = document.getElementById('pg-title');
    if(titleEl) titleEl.textContent = titles[pageName] || pageName;

    // Trigger Page Loaders
    if(pageName === 'dashboard') loadDashboard();
    if(pageName === 'settings') loadSettings();
    if(pageName === 'profile') loadProfile();
    if(pageName === 'vault') vaultRefresh();
    if(pageName === 'analytics') loadAnalytics();
    if(pageName === 'reports') loadReports();
    if(pageName === 'emd') loadEMDPage();
    if(pageName === 'boq') populateSelects();
    if(pageName === 'checklist') populateSelects();
    if(pageName === 'documents') populateSelects();
    if(pageName === 'postaward') populatePASelect();
    if(pageName === 'analyse') {
        // Clear analyse state
        document.getElementById('an-res').style.display = 'none';
        document.getElementById('an-tid').value = '';
    }
  }
}

// ── DASHBOARD LOGIC ───────────────────────────────────────────────────────
async function loadDashboard() {
  try {
    var r = await fetch('/dashboard');
    if(!r.ok) throw new Error('Server error');
    var d = await r.json();
    
    // Update Global DB
    _db = {};
    (d.tenders || []).forEach(function(t){ _db[String(t.t247_id)] = t; });
    _lastDb = _db;
    
    // Update Stats
    var s = d.stats || {};
    var nbTot = document.getElementById('nb-tot');
    if(nbTot) nbTot.textContent = s.total || 0;
    
    // Render UI
    renderDash();
    renderStatCards(s);
    
    // Check Drive Status
    checkDriveStatus();
  } catch(e) {
    console.error('Dashboard load failed:', e);
    var tb = document.getElementById('dash-tb');
    if(tb) tb.innerHTML = '<tr><td colspan="9" style="color:var(--red2);text-align:center;padding:20px">Error loading dashboard: '+e.message+'</td></tr>';
  }
}

function renderStatCards(s) {
  var el = document.getElementById('stat-cards');
  if(!el) return;
  var data = [
    {n:s.total||0, l:'Total Tenders', accent:'var(--blue2)', flt:''},
    {n:s.bid||0, l:'BID', accent:'var(--green)', flt:'BID'},
    {n:s.conditional||0, l:'Conditional', accent:'var(--amber)', flt:'CONDITIONAL'},
    {n:s.no_bid||0, l:'No-Bid', accent:'var(--red)', flt:'NO-BID'},
  ];
  el.innerHTML = data.map(function(d){
    return '<div class="stat-c" style="--ac:'+d.accent+'" onclick="filterDash(\''+d.flt+'\')">'
      +'<div class="stat-n" style="color:'+d.accent+'">'+d.n+'</div>'
      +'<div class="stat-l">'+d.l+'</div>'
      +'</div>';
  }).join('');
}

function filterDash(flt) {
  currentFilter = flt;
  document.querySelectorAll('.fbt').forEach(function(b){ b.classList.remove('on'); });
  // Find button that matches filter text roughly
  var btns = Array.from(document.querySelectorAll('.fbt'));
  var match = btns.find(function(b){ return b.textContent.includes(flt) || (flt==='' && b.textContent==='All'); });
  if(match) match.classList.add('on');
  renderDash();
}

function renderDash() {
  var tenders = Object.values(_db || {});
  var q = (document.getElementById('dash-q')||{value:''}).value.toLowerCase();
  var flt = currentFilter || '';
  
  var arr = tenders.filter(function(t){
    var v = (t.verdict || t.bid_no_bid || 'REVIEW').toUpperCase();
    if(flt && v!==flt) return false;
    if(q) {
      var s = (t.brief||'')+(t.org_name||'')+(t.t247_id||'');
      if(!s.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  var tbody = document.getElementById('dash-tb');
  var empty = document.getElementById('dash-empty');
  var cnt = document.getElementById('dash-cnt');
  
  if(!arr.length) {
    if(tbody) tbody.innerHTML = '';
    if(empty) empty.style.display = '';
    if(cnt) cnt.textContent = '';
    return;
  }
  if(empty) empty.style.display = 'none';
  if(cnt) cnt.textContent = arr.length + ' tender(s)';

  tbody.innerHTML = arr.map(function(t){
    var v = (t.verdict || t.bid_no_bid || 'REVIEW').toUpperCase();
    var vClass = v==='BID'?'vb-bid':v==='NO-BID'?'vb-no':v==='CONDITIONAL'?'vb-cond':'vb-rev';
    var dl = getDaysLeft(t);
    var dlClass = dl<=0?'dl-urg':dl<=3?'dl-soon':'dl-ok';
    
    return '<tr onclick="viewTenderDetail(\''+t.t247_id+'\')" style="cursor:pointer">'
      +'<td class="mono">'+t.t247_id+'</td>'
      +'<td><div class="brc">'+(t.brief||t.tender_name||'—')+'</div><div class="org">'+(t.org_name||'')+'</div></td>'
      +'<td>'+(t.mode_of_selection||'—')+'</td>'
      +'<td>'+(t.estimated_cost_cr?'₹'+t.estimated_cost_cr+'Cr':'—')+'</td>'
      +'<td class="mono">'+(t.emd||'—')+'</td>'
      +'<td class="'+dlClass+'">'+daysDisplay(dl)+'</td>'
      +'<td>'+(t.match_score||'—')+'</td>'
      +'<td><span class="vb '+vClass+'">'+v+'</span></td>'
      +'<td><span class="sb2 '+(t.status==='Won'?'st-won':t.status==='Lost'?'st-lst':'st-id')+'">'+(t.status||'Identified')+'</span></td>'
      +'<td><button class="ract" onclick="event.stopPropagation();rowAnalyse(event,\''+t.t247_id+'\')">⚡</button></td>'
      +'</tr>';
  }).join('');
}

function getDaysLeft(t) {
  if(!t.deadline && !t.bid_submission_date) return 999;
  var s = t.deadline || t.bid_submission_date;
  // Simple parse for DD-MM-YYYY or YYYY-MM-DD
  var parts = s.split(/[-\/]/);
  var d;
  try {
    if(parts[0].length === 4) d = new Date(+parts[0], +parts[1]-1, +parts[2]);
    else d = new Date(+parts[2], +parts[1]-1, +parts[0]);
    return Math.ceil((d - new Date()) / 86400000);
  } catch(e) { return 999; }
}

function daysDisplay(dl) {
  if(dl===999) return '—';
  if(dl<0) return '<span style="color:var(--t4)">Expired</span>';
  if(dl===0) return '<span style="color:var(--red2);font-weight:800">TODAY</span>';
  if(dl<=3) return '<span style="color:var(--red2)">'+dl+'d</span>';
  if(dl<=7) return '<span style="color:var(--amber2)">'+dl+'d</span>';
  return dl+'d';
}

function viewTenderDetail(tid) {
  currentTenderId = tid;
  var t = _db[tid];
  if(!t) return;
  
  var rp = document.getElementById('rp');
  if(rp) rp.classList.add('open');
  
  var ttl = document.getElementById('rp-ttl');
  if(ttl) ttl.textContent = t.brief || t.tender_name || tid;
  
  var body = document.getElementById('rp-body');
  if(body) {
    var v = (t.verdict || 'REVIEW').toUpperCase();
    var vCol = v==='BID'?'var(--green)':v==='NO-BID'?'var(--red)':v==='CONDITIONAL'?'var(--amber)':'var(--blue3)';
    body.innerHTML = 
      '<div style="padding:9px 11px;margin-bottom:9px;background:rgba(255,255,255,.03);border-radius:var(--r)">'
      +'<div style="font-size:18px;font-weight:900;color:'+vCol+';font-family:var(--fm)">'+v+'</div>'
      +'<div style="font-size:10px;color:var(--t3);margin-top:3px">'+(t.reason||'').substring(0,100)+'</div></div>'
      +'<div class="ir"><span class="il">T247 ID</span><span class="iv mono">'+tid+'</span></div>'
      +'<div class="ir"><span class="il">Organisation</span><span class="iv">'+_sv(t.org_name)+'</span></div>'
      +'<div class="ir"><span class="il">Value</span><span class="iv">'+_sv(t.estimated_cost)+'</span></div>'
      +'<div class="ir"><span class="il">Deadline</span><span class="iv">'+_sv(t.bid_submission_date)+'</span></div>'
      +'<div class="ir"><span class="il">EMD</span><span class="iv">'+_sv(t.emd)+'</span></div>';
  }
  
  var acts = document.getElementById('rp-acts');
  if(acts) {
    acts.innerHTML = '<button class="btn btn-g btn-sm" onclick="rpAnalyse(\''+tid+'\')">⚡ Analyse</button>'
      +'<button class="btn btn-g btn-sm" onclick="closeRP()">✕ Close</button>';
  }
}

function closeRP() {
  var rp = document.getElementById('rp');
  if(rp) rp.classList.remove('open');
}

function rpAnalyse(tid) {
  closeRP();
  document.getElementById('an-tid').value = tid;
  go('analyse');
}

function rowAnalyse(e, tid) {
  e.stopPropagation();
  rpAnalyse(tid);
}

// ── SETTINGS & PROFILE ────────────────────────────────────────────────────
async function loadSettings() {
  try {
    var r = await fetch('/config');
    if(!r.ok) return;
    var d = await r.json();
    ['key1','key2','key3','key4'].forEach(function(id,i){
      var el=document.getElementById(id); 
      if(el && d.gemini_api_keys && d.gemini_api_keys[i]) el.value=d.gemini_api_keys[i];
      else if(el && d.gemini_api_key && i===0) el.value=d.gemini_api_key;
    });
    var sd=document.getElementById('sys-d'); 
    if(sd) sd.textContent=d.drive_connected?'Connected':'—';
  } catch(e) {}
}

async function loadProfile() {
  try {
    var r = await fetch('/profile');
    if(!r.ok) return;
    var d = await r.json();
    profileData = d;
    // Render profile forms (simplified for stability)
    var basic = document.getElementById('profile-basic-form');
    if(basic && d.company) {
      basic.innerHTML = '<div class="card-title">Company Identity</div>'
        +'<div class="fg"><label class="fl">Name</label><input class="fi" value="'+(d.company.name||'')+'" disabled></div>'
        +'<div class="fg"><label class="fl">CIN</label><input class="fi mono" value="'+(d.company.cin||'')+'" disabled></div>'
        +'<div class="fg"><label class="fl">GSTIN</label><input class="fi mono" value="'+(d.company.gstin||'')+'" disabled></div>'
        +'<div class="fg"><label class="fl">MSME Udyam</label><input class="fi mono" value="'+(d.company.udyam||d.company.msme_udyam||'')+'" disabled></div>';
    }
  } catch(e) {}
}

// ── DRIVE STATUS ──────────────────────────────────────────────────────────
function checkDriveStatus() {
  fetch('/drive-status').then(function(r){return r.json();}).then(function(d){
    var dot = document.getElementById('ds-dot');
    var label = document.getElementById('ds-label');
    if(dot) dot.className = 'ds-dot ' + (d.drive_connected ? 'on' : 'off');
    if(label) label.textContent = d.drive_connected ? 'Drive: Connected' : 'Drive: Offline';
  }).catch(function(){
    var dot = document.getElementById('ds-dot');
    if(dot) dot.className = 'ds-dot off';
  });
}

// ── ANALYSE PAGE HELPERS ────────────────────────────────────────────────
function updateFileList(input) {
  var el = document.getElementById('an-fl');
  if(el) el.textContent = Array.from(input.files).map(function(f){return f.name;}).join(', ');
}

function populateSelects() {
  var tenders = Object.values(_db||{});
  var ids = ['corr-sel','pbm-sel','doc-select','boq-sel','cl-sel','pa-select'];
  ids.forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    el.innerHTML = '<option value="">Select tender...</option>' + tenders.map(function(t){
      return '<option value="'+t.t247_id+'">'+t.t247_id+' — '+(t.brief||t.org_name||'').substring(0,40)+'</option>';
    }).join('');
  });
}

function populatePASelect() {
  var tenders = Object.values(_db||{}).filter(function(t){ return t.status==='Won' || (t.verdict||'').toUpperCase()==='BID'; });
  var el = document.getElementById('pa-select');
  if(!el) return;
  el.innerHTML = '<option value="">Select won tender...</option>' + tenders.map(function(t){
    return '<option value="'+t.t247_id+'">'+t.t247_id+' — '+(t.brief||'').substring(0,40)+'</option>';
  }).join('');
}

// ── INITIALIZATION ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  // Set Date
  var d = new Date();
  var opts = {day:'2-digit',month:'short',year:'numeric'};
  var todayEl = document.getElementById('today-d');
  if(todayEl) todayEl.textContent = d.toLocaleDateString('en-IN', opts);
  
  // Start App
  go('dashboard');
});
</script>
