// ── UTILITIES ──────────────────────────────────────────────────────────────
function _sv(v) {
  if (v === null || v === undefined || v === '') return '—';
  if (typeof v === 'object') return v.value || v.text || JSON.stringify(v);
  return String(v);
}

function toast(msg, type='info', dur=3000) {
  var wrap = document.getElementById('tw');
  if(!wrap) return;
  var div = document.createElement('div');
  div.className = 'toast ' + (type==='error'?'err':type==='success'?'ok':'info');
  div.textContent = msg;
  wrap.appendChild(div);
  setTimeout(function(){ if(div.parentNode) div.parentNode.removeChild(div); }, dur);
}

function showLoading(msg) {
  var lov = document.getElementById('lov');
  if(lov) { lov.classList.add('open'); document.getElementById('ltxt').textContent = msg||'Processing...'; }
}
function hideLoading() {
  var lov = document.getElementById('lov');
  if(lov) lov.classList.remove('open');
}
